services:
  # ─── Web Service (Customer Portal Only) ───────────────────────────────────────
  - type: web
    name: bakery-customer-portal
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/bootstrap_database.py
    startCommand: gunicorn --config gunicorn.conf.py wsgi:app
    healthCheckPath: /healthz

    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORTAL_ROLE
        value: customer
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

      # TiDB Cloud - External Database (NOT Render PostgreSQL)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: DB_SSL_VERIFY_CERT
        value: "true"
      - key: DB_SSL_VERIFY_IDENTITY
        value: "true"

      # Redis - External (or Render Redis)
      - key: REDIS_URL
        sync: false

      # Mail
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

      # Firebase
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

      # Google Maps
      - key: GOOGLE_MAPS_API_KEY
        sync: false

      # Sentry
      - key: SENTRY_DSN
        sync: false

      # Production settings
      - key: USE_PROXY_FIX
        value: "true"
      - key: SHOW_DEMO_ACCOUNTS
        value: "false"
      - key: OFFLINE_SYNC_ENABLED
        value: "false"
      - key: RATELIMIT_STORAGE_URI
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString
      - key: SOCKETIO_MESSAGE_QUEUE
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString

  # ─── Celery Worker ─────────────────────────────────────────────
  - type: worker
    name: bakery-celery-worker
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_app.celery worker --loglevel=info --concurrency=2

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: DB_HOST
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_HOST
      - key: DB_PORT
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_PORT
      - key: DB_USER
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_USER
      - key: DB_PASSWORD
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_PASSWORD
      - key: DB_NAME
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_NAME
      - key: DB_SSL_CA
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_SSL_CA
      - key: DB_SSL_VERIFY_CERT
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_SSL_VERIFY_CERT
      - key: DB_SSL_VERIFY_IDENTITY
        fromService:
          name: bakery-customer-portal
          type: web
          envVarKey: DB_SSL_VERIFY_IDENTITY
      - key: REDIS_URL
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: bakery-redis
          type: redis
          property: connectionString

  # ─── Redis (for SocketIO, Celery, Cache, Rate Limiting) ──────────────────────
  - name: bakery-redis
    type: redis
    plan: free
    ipAllowList: []