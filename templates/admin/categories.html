{% extends 'admin/base_admin.html' %}
{% block title %}Categories — Admin{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
  <h1 style="font-family:var(--font-display);font-size:1.75rem;color:var(--brown)">📁 Categories</h1>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem">
  <div class="card">
    <div class="card-header">Add Category</div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('admin.add_category') }}">
        <div class="form-group"><label class="form-label">Category Name</label><input class="form-control" name="name" required placeholder="e.g. Macarons"></div>
        <div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-control" name="icon" value="🎂" maxlength="4"></div>
        <button type="submit" class="btn btn-primary">Add Category</button>
      </form>
    </div>
  </div>
  <div class="card">
    <div class="card-header">Existing Categories</div>
    <div class="card-body" style="padding:0">
      {% for c in cats %}
      <div style="padding:0.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem">
        <span style="font-size:1.5rem">{{ c.icon }}</span>
        <span style="font-weight:600;flex:1">{{ c.name }}</span>
        <span class="text-muted text-sm">{{ c.products.count() }} products</span>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
