{% extends 'base.html' %}
{% block title %}Choose New Password — {{ bakery_name }}{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="portal-auth-shell portal-auth-shell--customer">
  <div class="portal-auth-card">
    <div class="portal-auth-header">
      <div class="portal-auth-icon">🧁</div>
      <span class="portal-auth-kicker">Customer Portal</span>
      <h1 class="portal-auth-title">Choose a new password</h1>
      <p class="portal-auth-subtitle">Your new password must be at least 6 characters long.</p>
    </div>
    <div class="portal-auth-card-body">
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-control" type="password" name="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input class="form-control" type="password" name="confirm_password" required minlength="6" autocomplete="new-password" placeholder="Re-enter your new password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
