version: "3.8"

services:
  customer_web:
    build: .
    env_file:
      - .env
    environment:
      FLASK_ENV: development
      PORTAL_ROLE: customer
      PORT: "5000"
      REDIS_URL: redis://redis:6379/0
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy

  admin_web:
    build: .
    env_file:
      - .env
    command: gunicorn --config gunicorn.conf.py 'app:create_app("development", portal_role="admin")'
    environment:
      FLASK_ENV: development
      PORTAL_ROLE: admin
      PORT: "5001"
      REDIS_URL: redis://redis:6379/0
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
    ports:
      - "5001:5001"
    depends_on:
      redis:
        condition: service_healthy

  delivery_web:
    build: .
    env_file:
      - .env
    command: gunicorn --config gunicorn.conf.py 'app:create_app("development", portal_role="delivery")'
    environment:
      FLASK_ENV: development
      PORTAL_ROLE: delivery
      PORT: "5002"
      REDIS_URL: redis://redis:6379/0
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
    ports:
      - "5002:5002"
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    env_file:
      - .env
    command: celery -A celery_app.celery worker --loglevel=info
    environment:
      FLASK_ENV: development
      PORTAL_ROLE: customer
      REDIS_URL: redis://redis:6379/0
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
